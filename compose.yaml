services:
  mongodb:
    # MongoDB 8.2 is the compatible local fallback for Linux kernel 6.19+.
    image: mongo:8.2
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: emercard_local
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --host localhost --eval 'db.adminCommand({ ping: 1 }).ok' | grep -q 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

