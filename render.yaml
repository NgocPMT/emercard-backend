services:
  - type: web
    name: emercard-api
    runtime: python
    plan: free
    buildCommand: pip install uv==0.11.19 && uv sync --locked --no-dev
    startCommand: uv run --no-dev uvicorn emercard.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: EMERCARD_ENVIRONMENT
        value: demo
      - key: EMERCARD_DEBUG
        value: "false"
      - key: EMERCARD_MONGODB_URI
        sync: false
      - key: EMERCARD_MONGODB_DATABASE
        sync: false
      - key: EMERCARD_MONGODB_TLS_REQUIRED
        value: "true"
      - key: EMERCARD_AUTH_SECRET
        generateValue: true
      - key: EMERCARD_FRONTEND_BASE_URL
        sync: false
      - key: EMERCARD_CORS_ORIGINS
        sync: false
      - key: EMERCARD_CORS_ALLOW_CREDENTIALS
        value: "true"
      - key: EMERCARD_PUBLIC_CARD_BASE_URL
        value: https://emercard.id.vn/e
      - key: EMERCARD_PUBLIC_PROFILE_BASE_URL
        value: https://emercard.id.vn/e
      - key: EMERCARD_AUTH_COOKIE_SECURE
        value: "true"
